<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #FFFBF5; overflow: hidden;
      font-family: -apple-system, "SF Pro", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    body { position: fixed; inset: 0; overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
    #root { width: 100%; height: 100vh; height: 100svh; }
    *::-webkit-scrollbar { width: 0; height: 0; }
    button:active { transform: scale(0.97); }
    input::placeholder, textarea::placeholder { color: rgba(31,32,36,0.4); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
